<!doctype html>
<html>
<body style="margin:0;background:#111">
<img id="screen" style="width:100%" />
<script>
const p=new URLSearchParams(location.search);
const ws=new WebSocket(`ws://${location.host}?sessionId=${p.get("sessionId")}`);
const img=document.getElementById("screen");
ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==="frame"){img.src="data:image/jpeg;base64,"+m.data;}};
</script>
</body>
</html>
